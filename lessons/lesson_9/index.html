<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заняття 9 - Flexbox</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        img {
            width: 250px;
            box-shadow: 3px 3px 15px black;
        }

        .flex-container {
            display: flex;
            /* justify-content: space-around;
            align-items: center; */
            gap: 4em;

            background-color: bisque;
            padding: 2em;
            margin: 2em;
            border: 1px solid cadetblue;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="flex-container">
        <img src="../shared_resources/emoji.jpg" alt="Фото 1">
        <img src="../shared_resources/emoji.jpg" alt="Фото 2">
        <img src="../shared_resources/emoji.jpg" alt="Фото 3">
    </div>
</body>

</html>
